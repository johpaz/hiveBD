name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
            artifact: libhivedb_napi.so
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            triple: linux-arm64-gnu
            artifact: libhivedb_napi.so
          - os: macos-13
            target: x86_64-apple-darwin
            triple: darwin-x64
            artifact: libhivedb_napi.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            triple: darwin-arm64
            artifact: libhivedb_napi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
            artifact: hivedb_napi.dll
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.triple }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build native binding
        run: cargo build -p hivedb-napi --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "artifacts/hivedb-napi.node"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.triple }}
          path: artifacts/hivedb-napi.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings

      - name: Place binaries into platform packages
        run: |
          for triple in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            cp "bindings/bindings-${triple}/hivedb-napi.node" "packages/hive-db/npm/${triple}/hivedb-napi.node"
          done

      - name: Publish platform packages
        working-directory: packages/hive-db
        run: |
          for triple in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            npm publish "./npm/${triple}" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build TypeScript
        working-directory: packages/hive-db
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Publish main package
        working-directory: packages/hive-db
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
